version: '3.8'

services:
  # The Laravel + Nginx + Queue + Reverb Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: fmikom-portal:latest
    container_name: fmikom_app
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_URL=http://localhost
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=fmikom_portal
      - DB_USERNAME=fmikom_user
      - DB_PASSWORD=secret_db_pass
      - CACHE_STORE=redis
      - QUEUE_CONNECTION=redis
      - SESSION_DRIVER=redis
      - REDIS_HOST=redis
      - RUN_MIGRATIONS=true
    depends_on:
      - mysql
      - redis
    volumes:
      # Persistent storage for user-uploaded assets (portfolios, certificates, avatars, etc.)
      - app_storage:/var/www/html/storage/app

  # MySQL Database Server
  mysql:
    image: mysql:8.0
    container_name: fmikom_db
    restart: always
    environment:
      - MYSQL_DATABASE=fmikom_portal
      - MYSQL_USER=fmikom_user
      - MYSQL_PASSWORD=secret_db_pass
      - MYSQL_ROOT_PASSWORD=secret_root_pass
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"

  # Redis for cache, queues, and sessions
  redis:
    image: redis:alpine
    container_name: fmikom_redis
    restart: always
    volumes:
      - redis_data:/data

volumes:
  db_data:
  redis_data:
  app_storage:
