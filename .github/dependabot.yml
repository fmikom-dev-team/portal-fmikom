# Konfigurasi Dependabot untuk pembaruan dependensi otomatis
# Dokumentasi lengkap: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # Pembaruan untuk Composer (PHP Packages)
  - package-ecosystem: "composer"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
      timezone: "Asia/Jakarta"
    open-pull-requests-limit: 5

  # Pembaruan untuk NPM (Node Packages)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:30"
      timezone: "Asia/Jakarta"
    open-pull-requests-limit: 5

  # Pembaruan untuk GitHub Actions Workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
      timezone: "Asia/Jakarta"
    open-pull-requests-limit: 3
