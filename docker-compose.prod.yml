version: '3.8'

services:
  # The Laravel + Nginx + Queue + Reverb Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: fmikom-portal:latest
    container_name: fmikom_app
    restart: unless-stopped
    ports:
      - "${PORT:-80}:80"
    environment:
      - APP_ENV=production
      - APP_DEBUG=${APP_DEBUG:-false}
      - APP_KEY=${APP_KEY}
      - APP_URL=${APP_URL:-http://localhost}
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-fmikom_portal}
      - DB_USERNAME=${DB_USERNAME:-fmikom_user}
      - DB_PASSWORD=${DB_PASSWORD}
      - CACHE_STORE=redis
      - QUEUE_CONNECTION=redis
      - SESSION_DRIVER=redis
      - REDIS_HOST=redis
      - REDIS_PERSISTENT=true
      - RUN_MIGRATIONS=${RUN_MIGRATIONS:-true}
    depends_on:
      - mysql
      - redis
    volumes:
      # Persistent storage for user-uploaded assets (portfolios, certificates, avatars, etc.)
      - app_storage:/var/www/html/storage/app

  # MySQL Database Server
  mysql:
    image: mysql:8.0
    container_name: fmikom_db
    restart: always
    environment:
      - MYSQL_DATABASE=${DB_DATABASE:-fmikom_portal}
      - MYSQL_USER=${DB_USERNAME:-fmikom_user}
      - MYSQL_PASSWORD=${DB_PASSWORD}
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "127.0.0.1:${FORWARD_DB_PORT:-3306}:3306"

  # Redis for cache, queues, and sessions
  redis:
    image: redis:alpine
    container_name: fmikom_redis
    restart: always
    volumes:
      - redis_data:/data

volumes:
  db_data:
  redis_data:
  app_storage:
