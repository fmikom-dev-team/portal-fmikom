[global]
daemonize = no

[www]
listen = 127.0.0.1:9000

; Mode dynamic sangat cocok untuk VPS co-located (web server + DB di satu VPS)
pm = dynamic

; Dengan RAM 16GB, batas max_children diset ke 150 (estimasi konsumsi PHP ~50-80MB per worker)
pm.max_children = 150

; Jumlah worker standby awal saat server baru dinyalakan
pm.start_servers = 20

; Jumlah minimum worker idle (tidak bekerja) yang selalu siap menerima request
pm.min_spare_servers = 10

; Jumlah maksimum worker idle
pm.max_spare_servers = 30

; Batas request yang ditangani per worker sebelum di-recycle (untuk mencegah memory leak)
pm.max_requests = 1000
